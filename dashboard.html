<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Member Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="dashboard-header">

<h2>St Peter's Church Portal</h2>

<button id="logout">Logout</button>

</header>

<section class="dashboard">

<div class="profile-card">

<img id="profile-pic" src="https://via.placeholder.com/120" class="profile-img">

<h2 id="user-name">Church Member</h2>

<p id="user-email"></p>

<input type="file" id="profileImage" accept="image/*">
<button id="uploadBtn">Upload Photo</button>

<img id="profilePreview" width="120">


<div class="dashboard-grid">

<a href="prayer.html" class="card">Prayer Request</a>

<a href="sermons.html" class="card">Watch Sermons</a>

<a href="events.html" class="card">Upcoming Events</a>

<a href="give.html" class="card">Pay Tithe / Offering</a>

</div>

</section>

<script type="module" src="dashboard.js"></script>

</body>
</html>
